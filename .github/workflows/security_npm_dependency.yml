name: Security npm dependency check
on:
  workflow_dispatch:
  schedule:
    - cron: "8 9 * * MON-FRI" # Every weekday at 09:08 UTC
jobs:
  security-npm-dependency-check:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Project security npm dependency check
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_npm_dependency.yml@95c48db64a6d50acd1f8f8a0f93d1019727e5b4d # v2 WORKFLOW_VERSION
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit

name: Security Snyk dependency check

on:
  workflow_dispatch:
  schedule:
    - cron: "40 6 * * MON-FRI"

jobs:
  security-snyk-check:
    name: Project security Snyk dependency check
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_snyk_scan_private.yml@v2
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
      subproject: ''
      severity: 'HIGH,CRITICAL'
      scan_type: 'fs' # or 'image'
      location: '.'
      slack_include_summary: true
      snyk_policy_path: ''
    secrets:
      HMPPS_SNYK_API_KEY: ${{ secrets.HMPPS_SNYK_API_KEY }}
      HMPPS_SRE_SLACK_BOT_TOKEN: ${{ secrets.HMPPS_SRE_SLACK_BOT_TOKEN }}
